<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block titel %}Hermes Board{% endblock %}</title>
  <link rel="stylesheet" href="/static/theme.css">
  <script src="/static/htmx.min.js" defer></script>
  <script src="/static/dragdrop.js" defer></script>
</head>
<body class="min-h-screen bg-slate-950 text-slate-300 antialiased">
  <header class="border-b border-slate-800">
    <nav class="mx-auto flex max-w-screen-2xl items-center gap-6 px-6 py-4">
      <a href="/" class="text-sm font-bold tracking-wide text-slate-100">Hermes Board</a>
      <div class="ml-auto flex items-center gap-2">
        <a href="/neu?vorlage=neu" class="rounded-lg bg-sky-700 px-3 py-1.5 text-xs font-semibold text-white hover:bg-sky-600">+ Neues Projekt</a>
        <a href="/neu?vorlage=aenderung" class="rounded-lg border border-slate-700 px-3 py-1.5 text-xs font-semibold text-slate-300 hover:border-slate-500">+ Änderung</a>
        <a href="/neu" class="rounded-lg border border-slate-700 px-3 py-1.5 text-xs font-semibold text-slate-300 hover:border-slate-500">+ Leere Karte</a>
      </div>
    </nav>
  </header>
  <main class="mx-auto max-w-screen-2xl px-6 py-6">
    {% block inhalt %}{% endblock %}
  </main>
</body>
</html>

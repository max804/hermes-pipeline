# Beispiel-Konfiguration des Poll-Workers.
# Nach /home/hermes-worker/config.yaml kopieren und anpassen;
# Pfad kommt aus $HERMES_WORKER_CONFIG (siehe hermes-worker.service).

board_url: "http://127.0.0.1:9119"
poll_intervall_s: 30

projekte_verzeichnis: "~/projekte"
datenbank: "~/worker.db"

aider_bin: "aider"
coder_modell: "ollama_chat/qwen3-coder"
# Reviewer-Zweitmodell: leer lassen, bis der Bug-Diff-Test entschieden ist
# (Kandidaten: qwen3.6, gpt-oss, ornith). Leer = Review bleibt beim Menschen.
# Muss architektonisch verschieden vom Coder sein!
reviewer_modell: ""
aider_timeout_s: 1200        # 20 Minuten, harte Regel
max_versuche: 3

docker_speicher: "8g"
docker_cpus: "4"

# Copier-Template-Quellen je Domäne. Solange das Skeleton im Monorepo
# liegt, ein lokaler Pfad; nach der Abspaltung: "gh:max804/skeleton-web".
copier_bin: "copier"
template_quellen:
  web: "~/hermes/hermes-pipeline/templates/skeleton-web"

# Spaltennamen nur überschreiben, wenn das Board abweicht:
# spalten:
#   eingang: "Eingang"
#   ...

telegram:
  # Token liegt in einer Datei, nie Klartext in Config oder Repo:
  token_datei: "~/telegram-token"
  chat_id: "123456789"

# Beispiel-Konfiguration des Poll-Workers.
# Nach /home/hermes-worker/config.yaml kopieren und anpassen;
# Pfad kommt aus $HERMES_WORKER_CONFIG (siehe hermes-worker.service).

board_url: "http://127.0.0.1:9119"
poll_intervall_s: 30

projekte_verzeichnis: "~/projekte"
datenbank: "~/worker.db"

aider_bin: "aider"
# LLM-Server: Lemonade (OpenAI-kompatible API) auf dem Strix Halo.
# Der Schlüssel ist ein Dummy — Lemonade prüft ihn nicht.
openai_api_base: "http://192.168.178.27:13305/api/v1"
openai_api_key: "lemonade"
coder_modell: "openai/Qwen3-Coder-Next-GGUF"
# Zusatz-Flags für alle Aider-Läufe (Coder und Reviewer), verifiziert
# im Handtest gegen Lemonade:
aider_extra_args:
  - "--no-show-model-warnings"
  - "--map-tokens"
  - "1024"
  - "--timeout"
  - "900"
# Reviewer-Zweitmodell: leer lassen, bis der Bug-Diff-Test entschieden ist
# (Kandidaten aus §10: qwen3.6, ornith — Namen wie in Lemonade geladen,
# Präfix openai/). Leer = Review bleibt beim Menschen. Muss architektonisch
# verschieden vom Coder sein!
reviewer_modell: ""
aider_timeout_s: 1200        # 20 Minuten, harte Regel
max_versuche: 3

docker_speicher: "8g"
docker_cpus: "4"

# Copier-Template-Quellen je Domäne (abgespaltenes Skeleton-Repo, 16.07.2026).
# copier_bin ist normalerweise nicht nötig — Standard ist das copier aus
# dem venv des Workers (copier ist Laufzeit-Abhängigkeit von hermes-worker).
# copier_bin: "/pfad/zu/copier"
template_quellen:
  web: "gh:max804/skeleton-web"

# Spaltennamen nur überschreiben, wenn das Board abweicht:
# spalten:
#   eingang: "Eingang"
#   ...

telegram:
  # Token liegt in einer Datei, nie Klartext in Config oder Repo:
  token_datei: "~/telegram-token"
  chat_id: "123456789"

# Copier-Template skeleton-web (ARCHITEKTUR.md §5.1)
#
# Nutzung:  copier copy <template-quelle> ~/projekte/<name>
#
# Nur *.jinja-Dateien werden gerendert — die Jinja2-Templates der App
# selbst (app/templates/) bleiben unangetastet.

_subdirectory: template
_templates_suffix: .jinja
_min_copier_version: "9.0.0"

projektname:
  type: str
  help: "Projektname (kleinbuchstaben-mit-bindestrich, wird Repo-/Stack-Name)"
  validator: >-
    {% if not (projektname | regex_search('^[a-z][a-z0-9-]{2,49}$')) %}
    kleinbuchstaben-mit-bindestrich, 3-50 Zeichen
    {% endif %}

beschreibung:
  type: str
  help: "Ein Satz: was macht die App?"

port:
  type: int
  default: 8000
  help: "Interner App-Port (auch im Compose-Mapping)"

static_only:
  type: bool
  default: false
  help: "Nur statische Seiten (Minimalausprägung: keine Routen außer Auslieferung)?"

caddy_domain:
  type: str
  default: ""
  help: "Domain für den Caddy-Snippet (leer = kein Reverse-Proxy-Eintrag)"
